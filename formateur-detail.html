<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthèse de Positionnement - TSMEL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #0284c7;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --bg-base: #ffffff;
            --bg-surface: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: rgba(148, 163, 184, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-surface); color: var(--text-primary); padding: 40px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--bg-surface); padding-bottom: 20px; margin-bottom: 30px; }
        h1 { color: var(--primary); font-size: 1.8rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .card { padding: 25px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-surface); }
        .card h3 { margin-bottom: 15px; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-item { background: white; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 5px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        .synthesis-box { background: #fffaf0; border-left: 5px solid #ed8936; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .chart-container { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); height: 350px; display: flex; align-items: center; justify-content: center; }
        .correction-list { margin-top: 20px; }
        .correction-item { padding: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-error { background: #fee2e2; color: #991b1b; }
        .no-print { margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; background: var(--primary); color: white; }
        @media print {
            body { padding: 0; background: white; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            .no-print { display: none; }
            .card, .chart-container { break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div class="container" id="report">
        <div class="no-print">
            <button class="btn" onclick="window.print()">🖨️ Imprimer / Sauvegarder PDF</button>
        </div>

        <header>
            <div>
                <h1 id="disp-name">Chargement...</h1>
                <p id="disp-date" style="color: var(--text-secondary);"></p>
            </div>
            <div id="global-score-badge" style="font-size: 2rem; font-weight: 800; color: var(--primary);">--%</div>
        </header>

        <div class="synthesis-box">
            <h3 style="margin-bottom: 10px;">🤖 Synthèse Automatique</h3>
            <div id="synth-content">Analyse du profil en cours...</div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>📊 Scores par Domaine</h3>
                <div class="stat-grid" id="stat-grid">
                    <!-- Stats here -->
                </div>
            </div>
            <div class="chart-container">
                <canvas id="radarChart"></canvas>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>📝 Détails des Réponses</h3>
                <div class="correction-list" id="correction-list">
                    <!-- Correction here -->
                </div>
            </div>
            <div class="card">
                <h3>💡 Préconisations</h3>
                <ul id="reco-list" style="padding-left: 20px; color: var(--text-secondary);">
                    <!-- Recos here -->
                </ul>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const appId = urlParams.get('id');
        const correctOnes = {
            m1: "825", m2: "360", m3: "7",
            a1: "b", a2: "b", a3: "a"
        };

        function init() {
            const data = JSON.parse(localStorage.getItem('apprenant_' + appId));
            if (!data) { document.body.innerHTML = "<h1>Erreur: Données introuvables</h1>"; return; }
            
            document.getElementById('disp-name').innerText = (data.nom + " " + data.prenom).toUpperCase();
            document.getElementById('disp-date').innerText = "Positionnement du " + new Date(data.dateValidation).toLocaleDateString('fr-FR');

            const scores = calculate(data);
            render(data, scores);
        }

        function calculate(data) {
            let res = { log: 0, mat: 0, ang: 0, glob: 0 };
            
            // Logistique
            let lCount = 0;
            if (data.competences.comp1 === 'maitrise') res.log += 100; else if (data.competences.comp1 === 'encours') res.log += 60; lCount++;
            if (data.competences.comp2 === 'maitrise') res.log += 100; else if (data.competences.comp2 === 'encours') res.log += 60; lCount++;
            if (data.competences.comp3 === 'maitrise') res.log += 100; else if (data.competences.comp3 === 'encours') res.log += 60; lCount++;
            res.log = Math.round(res.log / lCount);

            // Maths
            let mOk = 0;
            if (data.maths.m1 === correctOnes.m1) mOk++;
            if (data.maths.m2 === correctOnes.m2) mOk++;
            if (data.maths.m3.includes(correctOnes.m3)) mOk++;
            res.mat = Math.round((mOk / 3) * 100);

            // Anglais
            let aOk = 0;
            if (data.anglais.a1 === correctOnes.a1) aOk++;
            if (data.anglais.a2 === correctOnes.a2) aOk++;
            if (data.anglais.a3 === correctOnes.a3) aOk++;
            res.ang = Math.round((aOk / 3) * 100);

            res.glob = Math.round((res.log + res.mat + res.ang) / 3);
            return res;
        }

        function render(data, scores) {
            document.getElementById('global-score-badge').innerText = scores.glob + "%";
            
            const grid = document.getElementById('stat-grid');
            const domains = [
                { l: 'Logistique', v: scores.log },
                { l: 'Maths', v: scores.mat },
                { l: 'Anglais', v: scores.ang }
            ];
            grid.innerHTML = domains.map(d => `
                <div class="stat-item">
                    <div class="stat-label">${d.l}</div>
                    <div class="stat-value">${d.v}%</div>
                </div>
            `).join('');

            // Chart
            new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: {
                    labels: ['Logistique', 'Mathématiques', 'Anglais'],
                    datasets: [{
                        label: 'Profil Apprenant',
                        data: [scores.log, scores.mat, scores.ang],
                        backgroundColor: 'rgba(2, 132, 199, 0.2)',
                        borderColor: '#0284c7',
                        pointBackgroundColor: '#0284c7'
                    }]
                },
                options: { scales: { r: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
            });

            // Synthesis
            let synth = "";
            if (scores.glob > 70) synth = "Excellent profil. Les bases techniques et transversales sont acquises. ";
            else if (scores.glob > 40) synth = "Profil intermédiaire. Un accompagnement sur les points faibles identifiés permettra une progression rapide. ";
            else synth = "Profil débutant. Un renforcement significatif des compétences de base est nécessaire avant d'aborder les modules complexes. ";
            
            if (scores.mat < 50) synth += "⚠️ Vigilance particulière sur le calcul numérique. ";
            if (data.apprentissage.aide === 'oui') synth += "🔍 Besoins spécifiques en lecture/écriture signalés.";
            document.getElementById('synth-content').innerText = synth;

            // Correction
            const corr = document.getElementById('correction-list');
            corr.innerHTML = `
                <div class="correction-item"><span>Maths Q1 (Somme)</span> ${data.maths.m1 === correctOnes.m1 ? '<span class="badge badge-success">OK</span>' : '<span class="badge badge-error">Echec</span>'}</div>
                <div class="correction-item"><span>Maths Q2 (Remise)</span> ${data.maths.m2 === correctOnes.m2 ? '<span class="badge badge-success">OK</span>' : '<span class="badge badge-error">Echec</span>'}</div>
                <div class="correction-item"><span>Anglais (Warehouse)</span> ${data.anglais.a1 === correctOnes.a1 ? '<span class="badge badge-success">OK</span>' : '<span class="badge badge-error">Echec</span>'}</div>
            `;

            // Recos
            const recos = document.getElementById('reco-list');
            let rItems = ["Poursuivre le programme TSMEL standard."];
            if (scores.mat < 60) rItems.push("Prévoir des exercices de remise à niveau en calcul professionnel.");
            if (scores.ang < 60) rItems.push("Utiliser des lexiques bilingues pour les termes techniques.");
            if (data.apprentissage.style === 'visuel') rItems.push("Favoriser les supports schématiques et vidéos.");
            recos.innerHTML = rItems.map(i => `<li>${i}</li>`).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
