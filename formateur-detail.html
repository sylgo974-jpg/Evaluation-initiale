<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails Apprenant - TSMEL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0284c7; --bg: #f8fafc; --text: #0f172a; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        header { border-bottom: 2px solid #f1f5f9; margin-bottom: 30px; padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .card { padding: 20px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .chart-container { height: 300px; display: flex; justify-content: center; }
        .badge { padding: 4px 12px; border-radius: 20px; font-weight: bold; }
        .synthesis { background: #fffbeb; border-left: 4px solid #f59e0b; padding: 20px; margin-top: 20px; border-radius: 4px; }
        @media print { .no-print { display: none; } .container { box-shadow: none; border: none; } }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-back { background: #e2e8f0; color: #475569; }
        .btn-print { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container" id="content">
    <header>
        <div>
            <h1 id="student-name">...</h1>
            <p id="eval-date" style="color:#64748b">Date de l'évaluation : ...</p>
        </div>
        <div class="no-print">
            <button class="btn btn-back" onclick="location.href='index.html'">Retour</button>
            <button class="btn btn-print" onclick="window.print()">Imprimer</button>
        </div>
    </header>

    <div class="grid">
        <div class="card">
            <h3>📊 Profil de Compétences</h3>
            <div class="chart-container">
                <canvas id="radarChart"></canvas>
            </div>
        </div>
        <div class="card">
            <h3>📈 Scores par Domaine</h3>
            <div style="margin-top: 20px;">
                <p>Français : <strong id="score-fr">0%</strong></p>
                <p>Mathématiques : <strong id="score-mat">0%</strong></p>
                <p>Anglais : <strong id="score-ang">0%</strong></p>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #e2e8f0;">
                <p style="font-size: 1.2rem;">Score Global : <strong id="score-glob" style="color:var(--primary)">0%</strong></p>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>🔍 Synthèse et Préconisations</h3>
        <div class="synthesis" id="synthesis-text">Chargement...</div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const results = JSON.parse(localStorage.getItem('eval_results') || '[]');
    const data = results.find(r => r.id == id);

    if (!data) {
        document.body.innerHTML = "<h1>Erreur: Données introuvables</h1>";
    } else {
        document.getElementById('student-name').innerText = data.nom;
        document.getElementById('eval-date').innerText = "Date de l'évaluation : " + data.date;
        document.getElementById('score-fr').innerText = data.scores.fr + "%";
        document.getElementById('score-mat').innerText = data.scores.mat + "%";
        document.getElementById('score-ang').innerText = data.scores.ang + "%";
        document.getElementById('score-glob').innerText = data.scores.glob + "%";

        // Chart
        new Chart(document.getElementById('radarChart'), {
            type: 'radar',
            data: {
                labels: ['Français', 'Maths', 'Anglais'],
                datasets: [{
                    label: 'Profil Apprenant',
                    data: [data.scores.fr, data.scores.mat, data.scores.ang],
                    backgroundColor: 'rgba(2, 132, 199, 0.2)',
                    borderColor: '#0284c7',
                    pointBackgroundColor: '#0284c7'
                }]
            },
            options: { scales: { r: { beginAtZero: true, max: 100 } } }
        });

        // Synthesis
        let synth = "";
        if (data.scores.glob >= 70) synth = "Excellent profil. L'apprenant possède les prérequis nécessaires pour suivre la formation TSMEL sans difficulté majeure.";
        else if (data.scores.glob >= 40) synth = "Profil équilibré avec quelques points de vigilance. Un accompagnement ponctuel sur les domaines les plus faibles est recommandé.";
        else synth = "Profil fragile. Une remise à niveau importante est nécessaire, notamment sur les bases fondamentales avant d'aborder les modules techniques.";

        if(data.scores.mat < 50) synth += " Attention particulière sur le calcul numérique.";
        
        document.getElementById('synthesis-text').innerText = synth;
    }
</script>

</body>
</html>
