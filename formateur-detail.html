<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthèse de Positionnement - TSMEL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0284c7; --bg: #f8fafc; --text: #0f172a; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header { border-bottom: 2px solid #f1f5f9; margin-bottom: 30px; padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .card { padding: 25px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; }
        .chart-container { height: 350px; display: flex; justify-content: center; align-items: center; }
        .synthesis-box { background: #fffbeb; border-left: 5px solid #f59e0b; padding: 25px; border-radius: 8px; margin-top: 20px; font-size: 1.1rem; line-height: 1.6; }
        .score-val { font-size: 2.5rem; font-weight: 800; color: var(--primary); display: block; margin-top: 10px; }
        .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block; }
        .btn-back { background: #f1f5f9; color: #475569; }
        .btn-print { background: var(--primary); color: white; margin-left: 10px; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
        .detail-label { color: #64748b; font-weight: 500; }
        @media print { .no-print { display: none; } .container { box-shadow: none; border: none; max-width: 100%; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 id="nom-apprenant">Chargement...</h1>
            <p id="info-eval" style="color:#64748b"></p>
        </div>
        <div class="no-print">
            <a href="index.html" class="btn btn-back">⬅ Retour</a>
            <button onclick="window.print()" class="btn btn-print">🖨 Imprimer</button>
        </div>
    </header>

    <div class="grid">
        <div class="card">
            <h3>📊 Radar de Compétences</h3>
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
        </div>
        <div class="card">
            <h3>🎯 Résultats par Domaine</h3>
            <div style="margin-top: 20px;">
                <div class="detail-row"><span class="detail-label">🇫🇷 Français</span> <strong id="val-fr">0%</strong></div>
                <div class="detail-row"><span class="detail-label">🔢 Mathématiques</span> <strong id="val-mat">0%</strong></div>
                <div class="detail-row"><span class="detail-label">🇬🇧 Anglais (B1)</span> <strong id="val-ang">0%</strong></div>
                <div class="detail-row"><span class="detail-label">📦 Logistique</span> <strong id="val-log">0%</strong></div>
                <div style="text-align: center; margin-top: 30px;">
                    <span style="font-size: 0.9rem; color: #64748b;">Moyenne Générale</span>
                    <span class="score-val" id="global-score">0%</span>
                </div>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>💼 Profil & Expérience</h3>
            <div id="profil-details" style="margin-top: 15px; font-size: 0.95rem;">
                <!-- Rempli par JS -->
            </div>
        </div>
        <div class="card">
            <h3>💻 Informatique & Besoins</h3>
            <div id="besoins-details" style="margin-top: 15px; font-size: 0.95rem;">
                <!-- Rempli par JS -->
            </div>
        </div>
    </div>

    <div class="card">
        <h3>📝 Synthèse Pédagogique (Auto)</h3>
        <div class="synthesis-box" id="synthesis">
            Analyse des réponses en cours...
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const resultId = urlParams.get('id');
    const allResults = JSON.parse(localStorage.getItem('eval_results') || '[]');
    const result = allResults.find(r => r.id == resultId);

    if (!result) {
        document.body.innerHTML = "<div style='text-align:center; padding:100px;'><h1>❌ Résultat introuvable</h1><p><a href='index.html'>Retour au dashboard</a></p></div>";
    } else {
        const r = result.reponses;
        const s = result.scores;

        document.getElementById('nom-apprenant').innerText = result.nom;
        document.getElementById('info-eval').innerText = "Évaluation TP TSMEL du " + result.date;
        document.getElementById('global-score').innerText = s.glob + "%";
        document.getElementById('val-fr').innerText = s.fr + "%";
        document.getElementById('val-mat').innerText = s.mat + "%";
        document.getElementById('val-ang').innerText = s.ang + "%";
        document.getElementById('val-log').innerText = s.log + "%";

        // Détails Profil
        document.getElementById('profil-details').innerHTML = `
            <div class="detail-row"><span class="detail-label">Diplôme:</span> <span>${r.diplome || 'N/A'}</span></div>
            <div class="detail-row"><span class="detail-label">Formation Logistique:</span> <span>${r.formation_log}</span></div>
            <div class="detail-row"><span class="detail-label">Expérience Terrain:</span> <span>${r.travail_log}</span></div>
            <p style="margin-top:10px; color:#64748b; font-size:0.85rem;"><strong>Attentes:</strong> ${r.attentes || 'Non spécifiées'}</p>
        `;

        // Détails Besoins
        document.getElementById('besoins-details').innerHTML = `
            <div class="detail-row"><span class="detail-label">Excel:</span> <span>${r.office_excel}</span></div>
            <div class="detail-row"><span class="detail-label">Publipostage Word:</span> <span>${r.office_word}</span></div>
            <div class="detail-row"><span class="detail-label">Aide lecture/écriture:</span> <span>${r.besoin_aide}</span></div>
            <div class="detail-row"><span class="detail-label">Aise à l'oral:</span> <span>${r.aise_oral}</span></div>
        `;

        // Graphique Radar
        new Chart(document.getElementById('myChart'), {
            type: 'radar',
            data: {
                labels: ['Français', 'Mathématiques', 'Anglais', 'Logistique'],
                datasets: [{
                    label: 'Score %',
                    data: [s.fr, s.mat, s.ang, s.log],
                    backgroundColor: 'rgba(2, 132, 199, 0.2)',
                    borderColor: '#0284c7',
                    borderWidth: 2,
                    pointBackgroundColor: '#0284c7'
                }]
            },
            options: {
                scales: { r: { min: 0, max: 100, ticks: { display: false } } },
                plugins: { legend: { display: false } }
            }
        });

        // Synthèse Automatique
        let text = "";
        if(s.glob >= 75) text = "Excellent profil. L'apprenant dispose de bases solides pour entamer la formation TSMEL. Sa maîtrise des prérequis est rassurante.";
        else if(s.glob >= 50) text = "Profil satisfaisant mais hétérogène. Certains domaines nécessitent une attention particulière pour ne pas pénaliser la progression technique.";
        else text = "Profil fragile. Des lacunes importantes sur les fondamentaux risquent de rendre le parcours difficile sans un accompagnement de remise à niveau immédiat.";

        if(s.mat < 50) text += " Un renforcement sur la logique mathématique (pourcentages, surfaces) est vivement conseillé.";
        if(s.fr < 50) text += " La compréhension de textes techniques semble être un point de blocage.";
        if(r.besoin_aide === 'Oui') text += " [Alerte Accompagnement] L'apprenant signale un besoin d'aide en lecture/écriture.";

        document.getElementById('synthesis').innerText = text;
    }
</script>

</body>
</html>
