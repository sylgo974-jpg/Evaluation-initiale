<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Formateur - TSMEL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #667eea; --secondary: #764ba2; --bg: #f8f9fa; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { background: white; padding: 30px; border-radius: 15px; margin-bottom: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); margin-bottom: 20px; font-size: 1.2em; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; background: #f8fafc; padding: 20px; border-radius: 10px; }
        .apprenant-item { background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; border: 2px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .apprenant-item:hover { border-color: var(--primary); background: #f1f5f9; transform: translateX(5px); }
        .apprenant-info h3 { font-size: 16px; margin-bottom: 5px; }
        .apprenant-info p { font-size: 13px; color: #64748b; }
        .badge { background: var(--primary); color: white; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .empty-state { text-align: center; padding: 40px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👨‍🏫 Console de Suivi Formateur - TSMEL</h1>
            <p>Gérez les positionnements et accédez aux tableaux de bord individuels</p>
        </header>

        <div class="main-grid">
            <!-- Partage -->
            <div class="card">
                <h2>📱 Accès Apprenants</h2>
                <p style="font-size: 14px; color: #64748b; margin-bottom: 15px;">Faites scanner ce QR Code pour lancer le questionnaire :</p>
                <div id="qrcode"></div>
                <div style="background: #f1f5f9; padding: 10px; border-radius: 8px; word-break: break-all; font-size: 12px; font-family: monospace;">
                    <span id="url-text"></span>
                </div>
            </div>

            <!-- Liste -->
            <div class="card">
                <h2>👥 Apprenants ayant validé (Cliquez pour voir le Dashboard)</h2>
                <div id="apprenants-list">
                    <div class="empty-state">En attente de réponses...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const currentPath = window.location.pathname;
        const BASE_URL = window.location.origin + currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
        const QUESTIONNAIRE_URL = BASE_URL + 'questionnaire.html';

        document.addEventListener('DOMContentLoaded', () => {
            // QR Code
            new QRCode(document.getElementById("qrcode"), {
                text: QUESTIONNAIRE_URL,
                width: 200,
                height: 200,
                colorDark: "#667eea",
                colorLight: "#ffffff"
            });
            document.getElementById('url-text').innerText = QUESTIONNAIRE_URL;

            // Chargement initial et rafraîchissement
            loadApprenants();
            setInterval(loadApprenants, 3000);
        });

        function loadApprenants() {
            const listContainer = document.getElementById('apprenants-list');
            const data = [];
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('apprenant_')) {
                    try {
                        data.push(JSON.parse(localStorage.getItem(key)));
                    } catch(e) {}
                }
            }

            if (data.length === 0) return;

            data.sort((a, b) => new Date(b.dateValidation) - new Date(a.dateValidation));

            listContainer.innerHTML = data.map(app => `
                <div class="apprenant-item" onclick="window.open('formateur-detail.html?id=${app.id}', '_blank')">
                    <div class="apprenant-info">
                        <h3>${app.nom.toUpperCase()} ${app.prenom}</h3>
                        <p>📅 Validé le ${new Date(app.dateValidation).toLocaleString('fr-FR')}</p>
                    </div>
                    <div class="badge">VOIR DASHBOARD 📊</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
