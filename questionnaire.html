<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grille de Positionnement Initial - TSMEL</title>
    <style>
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { font-size: 1.875rem; color: var(--text); margin-bottom: 8px; text-align: center; }
        p.subtitle { text-align: center; color: var(--text-muted); margin-bottom: 32px; }
        .step { display: none; }
        .step.active { display: block; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        input[type="text"], input[type="number"], textarea, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; }
        .options-grid { display: grid; gap: 12px; margin-top: 8px; }
        .option-item { display: flex; align-items: center; padding: 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .option-item:hover { background: #f1f5f9; }
        .option-item input { margin-right: 12px; }
        .btn-group { display: flex; justify-content: space-between; margin-top: 32px; }
        button { padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.2s; }
        .btn-next { background: var(--primary); color: white; }
        .btn-prev { background: #e2e8f0; color: var(--text); }
        .progress-container { height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 32px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); transition: width 0.3s ease; }
        .text-passage { background: #f1f5f9; padding: 20px; border-radius: 8px; margin-bottom: 20px; font-style: italic; border-left: 4px solid var(--primary); }
        .rgpd-notice { margin-top: 20px; display: flex; align-items: flex-start; gap: 10px; font-size: 0.9rem; color: var(--text-muted); }
        .rgpd-notice input { margin-top: 4px; width: auto; }
    </style>
</head>
<body>
<div class="container">
    <h1>Grille de Positionnement Initial</h1>
    <p class="subtitle">Formation TSMEL — Évaluation des prérequis<br>
    <small>Référentiel REAC Millésime 10 (21/12/2022)</small></p>
    
    <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
    </div>

    <form id="quizForm">
        <!-- Étape 1: Identification -->
        <div class="step active" id="step1">
            <div class="form-group">
                <label>Nom :</label>
                <input type="text" name="nom" required>
            </div>
            <div class="form-group">
                <label>Prénom :</label>
                <input type="text" name="prenom" required>
            </div>
            <div class="form-group">
                <label for="diplome">Dernier diplôme obtenu :</label>
                <select id="diplome" name="diplome" onchange="toggleAutreDiplome()" required>
                    <option value="" disabled selected>Choisissez dans la liste...</option>
                    <option value="Bac Pro Logistique">Bac Pro Logistique</option>
                    <option value="Titre Pro TLE">Titre Pro TLE (Niveau 4)</option>
                    <option value="Bac Général / Technologique">Bac Général / Technologique</option>
                    <option value="CAP / BEP">CAP / BEP</option>
                    <option value="Autre">Autre (Précisez...)</option>
                </select>
                <div id="autre_diplome_container" style="display:none; margin-top: 15px;">
                    <input type="text" id="autre_diplome" name="autre_diplome" placeholder="Précisez votre diplôme">
                </div>
            </div>
            <div class="rgpd-notice">
                <input type="checkbox" id="rgpd_consent" required>
                <label for="rgpd_consent">Je consens à la collecte de mes réponses pour mon positionnement initial (RGPD).</label>
            </div>
            <div class="btn-group">
                <span></span>
                <button type="button" class="btn-next" onclick="nextStep(1)">Suivant</button>
            </div>
        </div>

        <!-- Étape 2: Expérience -->
        <div class="step" id="step2">
            <h3>Expérience Professionnelle</h3>
            <div class="form-group">
                <label>Avez-vous déjà suivi une formation dans la logistique ?</label>
                <select id="formation_log" name="formation_log" onchange="togglePrecision('formation_log', 'precision_formation')" required>
                    <option value="Non">Non</option>
                    <option value="Oui">Oui</option>
                </select>
                <div id="precision_formation" style="display:none; margin-top: 10px;">
                    <input type="text" id="formation_detail" name="formation_detail" placeholder="Si oui, précisez (ex: Titre Pro TLE, CACES...)">
                </div>
            </div>
            <div class="form-group">
                <label>Avez-vous déjà travaillé dans ce domaine ?</label>
                <select id="travail_log" name="travail_log" onchange="togglePrecision('travail_log', 'precision_travail')" required>
                    <option value="Non">Non</option>
                    <option value="Oui">Oui</option>
                </select>
                <div id="precision_travail" style="display:none; margin-top: 10px;">
                    <input type="text" id="travail_detail" name="travail_detail" placeholder="Si oui, précisez (ex: Préparateur de commandes, 2 ans)">
                </div>
            </div>
            <div class="form-group">
                <label>Quelles sont vos attentes vis-à-vis de cette formation ?</label>
                <textarea name="attentes" rows="3"></textarea>
            </div>
            <div class="btn-group">
                <button type="button" class="btn-prev" onclick="prevStep(2)">Retour</button>
                <button type="button" class="btn-next" onclick="nextStep(2)">Suivant</button>
            </div>
        </div>

        <!-- Les autres étapes (Logistique, Français, Maths, Anglais, Profil) resteraient ici avec la même logique -->
        <!-- ... (Contenu abrégé pour la démo, mais devrait être complet dans le fichier réel) ... -->
        
    </form>
</div>

<script>
    let currentStep = 1;
    const totalSteps = 8; // À ajuster selon le nombre réel d'étapes

    function updateProgress() {
        const progress = (currentStep / totalSteps) * 100;
        document.getElementById('progress').style.width = progress + '%';
    }

    function nextStep(step) {
        if (!validateStep(step)) return;
        document.getElementById('step' + step).classList.remove('active');
        currentStep++;
        document.getElementById('step' + currentStep).classList.add('active');
        updateProgress();
    }

    function prevStep(step) {
        document.getElementById('step' + step).classList.remove('active');
        currentStep--;
        document.getElementById('step' + currentStep).classList.add('active');
        updateProgress();
    }

    function validateStep(step) {
        const inputs = document.getElementById('step' + step).querySelectorAll('[required]');
        for (let input of inputs) {
            if (!input.value && input.offsetParent !== null) {
                alert('Veuillez remplir tous les champs obligatoires.');
                return false;
            }
            if (input.type === 'checkbox' && !input.checked) {
                alert('Veuillez accepter les conditions RGPD.');
                return false;
            }
        }
        return true;
    }

    function toggleAutreDiplome() {
        const select = document.getElementById('diplome');
        const container = document.getElementById('autre_diplome_container');
        container.style.display = select.value === 'Autre' ? 'block' : 'none';
        document.getElementById('autre_diplome').required = select.value === 'Autre';
    }

    function togglePrecision(selectId, containerId) {
        const select = document.getElementById(selectId);
        const container = document.getElementById(containerId);
        container.style.display = select.value === 'Oui' ? 'block' : 'none';
        container.querySelector('input').required = select.value === 'Oui';
    }

    updateProgress();
</script>
</body>
</html>
